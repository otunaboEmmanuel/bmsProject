<body>
     <!-- Navbar Start -->

                    <button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
                        <span class="navbar-toggler-icon"></span>

                    <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
                        <div class="navbar-nav py-0">

            </div>
        </div>

<!-- Navbar End -->


    <!-- Header Start -->
    <div class="container-fluid page-header" >
        <div class="container">
            <div class="d-flex flex-column justify-content-center" style="min-height: 200px">
                <h3 class="display-4 text-white text-uppercase">Register Users</h3>
                <div class="d-inline-flex text-white">
                    <p class="m-0 text-uppercase"><a class="text-white" href="admin.html">Home</a></p>
                    <i class="fa fa-angle-double-right pt-1 px-3"></i>
                    <p class="m-0 text-uppercase">Register Users</p>
                </div>
            </div>
        </div>
    </div>
    <!-- Header End -->

    <!-- Register form -->
    <div class="container-fluid">
        <div class="container py-5">
            
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="contact-form bg-secondary rounded p-5">
                        <div id="success"></div>
                        <form id="registerForm" name="sentMessage" novalidate="novalidate">
                            <div class="text-center mb-5">
                                <h1>Register New User</h1>
                            </div>
                            <div class="control-group">
                                <label for="Username">Username</label>
                                <input type="text" class="form-control border-0 p-4" id="username" placeholder="" required="required" data-validation-required-message="Please enter your name" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="control-group">
                                <label for="Email">Email</label>
                                <input type="email" class="form-control border-0 p-4" id="email" placeholder="" required="required" data-validation-required-message="Please enter your email" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="control-group">
                                <label for="Password">Password</label>
                                <input type="password" class="form-control border-0 p-4" id="password" placeholder="" required="required" data-validation-required-message="Please enter your password" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="mb-3">
                                <label for="role" class="form-label">Role</label>
                                <select class="form-control" id="role">
                                    <option value="student">Student</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <br/>
                            <div class="text-center">
                                <button class="btn btn-primary py-3 px-5" type="submit" >Register</button>
                            </div>
                            
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Register form End -->

    <!-- footer -->
    <footer class="my-5 pt-5 text-body-secondary text-center text-small">
        <p class="mb-1">© 2025 Babcock University</p>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <!-- Template Javascript -->
    <script src="js/main.js"></script>
