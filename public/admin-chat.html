    <style>
        .chat-message {
            max-width: 75%;
            margin-bottom: 1rem;
        }
    
        .chat-message.sent {
            align-self: flex-end;
        }
    
        .chat-message.received {
            align-self: flex-start;
        }
    
        .message-content {
            padding: 0.75rem 1rem;
            border-radius: 15px;
            position: relative;
        }
    
        .sent .message-content {
            background-color: #007bff;
            color: white;
            border-bottom-right-radius: 5px;
        }
    
        .received .message-content {
            background-color: #e9ecef;
            color: #212529;
            border-bottom-left-radius: 5px;
        }
    
        .message-time {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 0.25rem;
        }

        .sent .message-time {
        text-align: right;
    }

    .chat-list-item {
        cursor: pointer;
        transition: all 0.3s ease;
        border-left: 3px solid transparent;
    }

    .chat-list-item:hover {
        background-color: #f8f9fa;
    }

    .chat-list-item.active {
        background-color: #e9ecef;
        border-left-color: #007bff;
    }

    .unread-badge {
        background-color: #007bff;
        color: white;
        border-radius: 50%;
        padding: 0.25rem 0.5rem;
        font-size: 0.75rem;
    }

    .user-status {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
    }

    .status-online {
        background-color: #28a745;
    }

    .status-offline {
        background-color: #dc3545;
    }

    #chat-container::-webkit-scrollbar {
        width: 5px;
    }

    #chat-container::-webkit-scrollbar-track {
        background: #f1f1f1;
    }

    #chat-container::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 5px;
    }

    #chat-container::-webkit-scrollbar-thumb:hover {
        background: #555;
    }
</style>

</head>

    <!-- Chat Section -->
<div class="container py-5">
    <div class="row">
        <!-- Chat List Sidebar -->
        <div class="col-md-4 mb-4">
            <div class="card shadow h-100">
                <div class="card-header bg-primary text-white py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="fas fa-users me-2"></i>
                        Student Conversations
                    </h5>
                    <button class="btn btn-light btn-sm" data-bs-toggle="modal" data-bs-target="#newMessageModal">
                        <i class="fas fa-plus"></i> New Message
                    </button>
                </div>
                <div class="card-body p-0">
                    <div id="chatList" class="list-group list-group-flush">
                        <!-- Chat list will be populated here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="col-md-8">
            <div class="card shadow h-100">
                <div class="card-header bg-primary text-white py-3">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-comment-dots me-2"></i>
                        <h5 class="mb-0" id="currentChatUser">Select a conversation</h5>
                    </div>
                </div>
                <div class="card-body bg-light" style="height: 500px; overflow-y: auto;" id="chat-container">
                    <div id="messagesContainer" class="d-flex flex-column gap-3">
                        <!-- Messages will be displayed here -->
                    </div>
                </div>
                <div class="card-footer bg-white">
                    <form id="adminReplyForm" class="mb-0">
                        <div class="input-group">
                            <textarea id="replyMessage" class="form-control" 
                                placeholder="Type your reply..." 
                                rows="1" 
                                style="resize: none;"
                            ></textarea>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- New Message Modal -->
<div class="modal fade" id="newMessageModal" tabindex="-1" aria-labelledby="newMessageModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="newMessageModalLabel">New Message</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="fas fa-search"></i>
                        </span>
                        <input type="text" 
                               class="form-control" 
                               id="userSearch" 
                               placeholder="Search users...">
                    </div>
                </div>
                <div class="list-group" id="userList">
                    <!-- Users will be populated here -->
                </div>
            </div>
        </div>
    </div>
</div>
