    <!-- Register form -->
    <div class="container-fluid">
        <div class="container py-5">
            <div class="text-center mb-5">
                <h1>Register</h1>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="contact-form bg-secondary rounded p-5">
                        <div id="success"></div>
                        <form id="registerForm" name="sentMessage" novalidate="novalidate">
                            <div class="control-group">
                                <input type="text" class="form-control border-0 p-4" id="username" placeholder="Username" required="required" data-validation-required-message="Please enter your name" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="control-group">
                                <input type="email" class="form-control border-0 p-4" id="email" placeholder="Email" required="required" data-validation-required-message="Please enter your email" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="control-group">
                                <input type="password" class="form-control border-0 p-4" id="password" placeholder="Password " required="required" data-validation-required-message="Please enter your password" />
                                <p class="help-block text-danger"></p>
                            </div>
                            <div class="mb-3">
                                <label for="role" class="form-label">Role</label>
                                <select class="form-control" id="role">
                                    <option value="student">Student</option>
                                    <!-- <option value="admin">Admin</option> -->
                                </select>
                            </div>
                            <br/>
                            <div class="text-center">
                                <button class="btn btn-primary py-3 px-5" type="submit" >Register</button>
                            </div>
                            <p class="mt-3">
                                Already have an account? <a href="login.html">Login here</a>.
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
