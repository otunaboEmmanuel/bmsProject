    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"> 

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/style.css" rel="stylesheet">

    <style>
        .order-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .order-card:hover {
            transform: translateY(-5px);
        }

        .order-header {
            background: linear-gradient(45deg, #4b7bec, #45aaf2);
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-body {
            padding: 20px;
            background: white;
        }

        .book-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .book-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
            transition: background-color 0.2s;
        }

        .book-item:last-child {
            border-bottom: none;
        }

        .book-item:hover {
            background-color: #f8f9fa;
        }

        .book-quantity {
            background: #e3f2fd;
            color: #1565c0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-left: 10px;
        }

        .order-footer {
            background: #f8f9fa;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
        }

        .total-price {
            font-size: 1.2rem;
            color: #2ecc71;
            font-weight: 600;
        }

        .order-date {
            color: #666;
            font-size: 0.9rem;
        }

        .order-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-denied {
            background: #f8d7da;
            color: #721c24;
        }

        .empty-orders {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        .empty-orders i {
            font-size: 3rem;
            color: #6c757d;
            margin-bottom: 15px;
        }

        .stats-container {
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #4b7bec;
        }
    </style>
</head>

     <div class="container py-5">

                    </div>
                </div>
                <div class="col-md-4">

                        <p class="text-muted mb-0">Books Purchased</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">

                        <h3 id="totalSpent">₦0</h3>
